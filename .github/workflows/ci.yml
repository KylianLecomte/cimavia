name: CI

on:
  push:
    branches: [main, staging, production]
  pull_request:
    branches: [main, staging, production]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: "10.34.4"
  NODE_VERSION: "22"

jobs:
  quality:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest
    env:
      # DATABASE_URL fictive pour que prisma generate puisse charger prisma.config.ts
      # prisma generate ne se connecte pas à la BDD — il lit uniquement schema.prisma
      # Sans cette variable, env() de Prisma 7 throw pendant postinstall
      DATABASE_URL: postgresql://cimavia_e2e:cimavia_dev_e2e@localhost:5432/cimavia_db_e2e

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome CI
        run: pnpm biome ci .

      - name: Typecheck
        run: pnpm turbo typecheck

      - name: Test
        run: pnpm turbo test
