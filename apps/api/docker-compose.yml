services:
  postgres:
    image: postgres:18-alpine
    container_name: cimavia_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cimavia
      POSTGRES_PASSWORD: cimavia
      POSTGRES_DB: cimavia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cimavia -d cimavia"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
